name: Build and publish Docker image

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        # v5 began hard-failing on 2026-07-16 with no repo-side change (two
        # consecutive runs, config identical to a same-day success) — v5's
        # deprecated Node runtime vs. v6's Node 24 on current runners.
        uses: docker/metadata-action@v6
        with:
          images: lffpicard/grooverr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      # Version footer (Section 8 Settings screen, Batch 9, Section 11 item
      # 19): github.sha is available directly for the commit SHA, no extra
      # step needed for that — but the build timestamp genuinely has to be
      # computed at workflow-run time, hence this one step.
      - name: Set build date
        id: build_date
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
