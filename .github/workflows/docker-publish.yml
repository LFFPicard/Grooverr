name: Build and publish Docker image

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Replaced docker/metadata-action (2026-07-16): its repo-metadata
      # GitHub API call returned server-side 500s ("Unicorn" pages, visible
      # in the failed runs' check annotations) across four consecutive
      # builds on both v5 and v6, taking image publishing down with it.
      # The tag set this project needs — latest on master, short SHA
      # always, version on v* tags — is trivially computable in shell with
      # zero API dependencies, so a GitHub API wobble can never block a
      # publish again. The action's other output (auto-generated OCI
      # labels from repo metadata) was cosmetic; the Dockerfile carries
      # its own LABELs.
      - name: Compute image tags
        id: meta
        run: |
          IMAGE=lffpicard/grooverr
          TAGS="$IMAGE:${GITHUB_SHA::7}"
          if [ "$GITHUB_REF" = "refs/heads/master" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          case "$GITHUB_REF" in
            refs/tags/v*) TAGS="$TAGS,$IMAGE:${GITHUB_REF#refs/tags/v}" ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      # Version footer (Section 8 Settings screen, Batch 9, Section 11 item
      # 19): github.sha is available directly for the commit SHA, no extra
      # step needed for that — but the build timestamp genuinely has to be
      # computed at workflow-run time, hence this one step.
      - name: Set build date
        id: build_date
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
